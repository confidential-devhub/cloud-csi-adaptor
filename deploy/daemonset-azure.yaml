apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: caa-csi-block-plugin
  namespace: caa-csi-block
  labels:
    app: caa-csi-block
spec:
  selector:
    matchLabels:
      app: caa-csi-block
  template:
    metadata:
      labels:
        app: caa-csi-block
    spec:
      serviceAccountName: caa-csi-provisioner
      containers:
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v3.6.0
          args:
            - "-v=3"
            - "--csi-address=/csi/csi.sock"
            - "--worker-threads=5"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /csi
              name: socket-dir

        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.9.0
          args:
            - "--v=3"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/caa-csi-block/csi.sock"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /registration
              name: registration-dir

        - name: cloud-csi-adaptor
          image: "<ACR_REGISTRY>/cloud-csi-adaptor:v0.3.0"
          args:
            - "--drivername=caa-csi-block.csi.confidentialcontainers.io"
            - "--endpoint=unix:///csi/csi.sock"
            - "--nodeid=$(KUBE_NODE_NAME)"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: caa-csi-azure-creds
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: caa-csi-azure-creds
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: caa-csi-azure-creds
                  key: AZURE_CLIENT_SECRET
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /var/lib/kubelet/pods
              name: mountpoint-dir
              mountPropagation: Bidirectional
            - mountPath: /var/lib/kubelet/plugins
              name: plugins-dir
              mountPropagation: Bidirectional
            - mountPath: /run/kata-containers/shared/direct-volumes
              name: shared-directvols
            - mountPath: /var/lib/caa-csi-block
              name: csi-data

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/caa-csi-block
            type: DirectoryOrCreate
        - name: mountpoint-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: plugins-dir
          hostPath:
            path: /var/lib/kubelet/plugins
            type: Directory
        - name: shared-directvols
          hostPath:
            path: /run/kata-containers/shared/direct-volumes/
            type: DirectoryOrCreate
        - name: csi-data
          hostPath:
            path: /var/lib/caa-csi-block
            type: DirectoryOrCreate
